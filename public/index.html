<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Consultorio Medico Distribuido</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Consultorio Aurora</h1>
  </header>

  <main>
    <section id="auth" class="card">
      <h2>Acceso al sistema</h2>
      <div class="grid two">
        <form id="loginForm">
          <h3>Iniciar sesion</h3>
          <input name="username" placeholder="Usuario" required>
          <input name="password" type="password" placeholder="Contrasena" required>
          <button>Entrar</button>
        </form>

        <form id="registerForm">
          <h3>Registro de paciente</h3>
          <input name="username" placeholder="Usuario" required>
          <input name="password" type="password" placeholder="Contrasena" required>
          <input name="nombre" placeholder="Nombre" required>
          <input name="direccion" placeholder="Direccion" required>
          <input name="correo" type="email" placeholder="Correo" required>
          <input name="telefono" placeholder="Telefono" required>
          <input name="edad" type="number" placeholder="Edad" required>
          <select name="sexo" required>
            <option value="">Sexo</option>
            <option>Femenino</option>
            <option>Masculino</option>
            <option>No especificado</option>
          </select>
          <button>Registrar</button>
        </form>
      </div>
    </section>

    <section id="app" class="hidden">
      <div class="card row between">
        <div>
          <h2 id="welcome">Sesion iniciada</h2>
          <p id="role"></p>
        </div>
        <button id="logoutBtn" class="secondary">Cerrar sesion</button>
      </div>

      <section class="card">
        <h2>Notificaciones</h2>
        <button id="loadNotifications">Actualizar notificaciones</button>
        <div id="notifications"></div>
      </section>

      <section id="doctorPanel" class="hidden">
        <section class="card">
          <h2>Pacientes</h2>
          <button id="loadPatients">Cargar pacientes</button>
          <div id="patientsTable"></div>
        </section>

        <section class="card">
          <h2>Registrar cita para un paciente</h2>
          <form id="doctorAppointmentForm" class="grid four">
            <select name="paciente_id" id="doctorPatientSelect" required></select>
            <input name="fecha" type="date" required>
            <input name="hora" type="time" min="09:00" max="19:00" step="1800" required>
            <button>Registrar cita</button>
          </form>
        </section>

        <section class="card">
          <h2>Registrar historial clinico</h2>
          <form id="clinicalForm" class="grid two">
            <select name="paciente_id" id="clinicalPatientSelect" required></select>
            <input name="temperatura" placeholder="Temperatura corporal" required>
            <input name="peso" placeholder="Peso" required>
            <input name="altura" placeholder="Altura" required>
            <input name="presion_arterial" placeholder="Presion arterial" required>
            <textarea name="diagnostico" placeholder="Diagnostico" required></textarea>
            <textarea name="resultados" placeholder="Resultados de analisis clinicos"></textarea>
            <textarea name="prescripciones" placeholder="Prescripciones"></textarea>
            <button>Guardar historial</button>
          </form>
        </section>

        <section class="card">
          <h2>Reportes del medico</h2>
          <div class="report-toolbar">
            <button id="reportPatients">Lista de pacientes</button>
            <button id="reportCalendar">Calendario de citas</button>
            <label class="report-filter">
              Paciente para historial
              <select id="reportHistoryPatientSelect" required></select>
            </label>
            <button id="reportHistory">Historial clinico</button>
          </div>
          <div id="reports" class="reports-output"></div>
        </section>
      </section>

      <section id="patientPanel" class="hidden">
        <section class="card">
          <h2>Mis datos</h2>
          <form id="myPatientForm" class="grid two">
            <input name="nombre" placeholder="Nombre">
            <input name="direccion" placeholder="Direccion">
            <input name="correo" placeholder="Correo">
            <input name="telefono" placeholder="Telefono">
            <input name="edad" type="number" placeholder="Edad">
            <select name="sexo">
              <option value="">Sin cambio</option>
              <option>Femenino</option>
              <option>Masculino</option>
              <option>No especificado</option>
            </select>
            <button>Actualizar datos</button>
          </form>
        </section>

        <section class="card">
          <h2>Reservar cita</h2>
          <form id="patientAppointmentForm" class="grid three">
            <input name="fecha" type="date" required>
            <input name="hora" type="time" min="09:00" max="19:00" step="1800" required>
            <button>Reservar</button>
          </form>
        </section>
      </section>

      <section class="card">
        <h2>Citas</h2>
        <button id="loadAppointments">Cargar citas</button>
        <div id="appointmentsTable"></div>
      </section>

      <section class="card">
        <h2>Historial clinico</h2>
        <div id="historyControls"></div>
        <div class="history-actions">
          <button id="loadHistory">Cargar historial</button>
          <button id="loadHistoryReport" class="secondary">Cargar reporte oficial</button>
        </div>
        <div id="history" class="history-list"></div>
      </section>
    </section>
  </main>

  <div id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
